<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ギャラリー方式サンプル比較</title>
  <style>
    body { font-family: sans-serif; background: #f5f5f0; padding: 2rem 1rem; }
    h2 { text-align: center; font-size: 1.3rem; margin: 2.5rem 0 1rem; color: #3D6B4F; border-bottom: 2px solid #3D6B4F; padding-bottom: 0.4rem; }
    .label { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 2px 10px; border-radius: 999px; margin-bottom: 0.3rem; }
    .label-before { background: rgba(0,0,0,0.55); color: #fff; }
    .label-after  { background: #3D6B4F; color: #fff; }
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.1); max-width: 520px; margin: 0 auto 3rem; }
    .card__body { padding: 1rem 1.2rem; }
    .card__meta { font-size: 0.78rem; color: #5C5C5C; margin-bottom: 0.5rem; }
    .card__comment { font-size: 0.875rem; color: #1A1A1A; line-height: 1.7; border-left: 3px solid #C8A96E; padding-left: 0.8rem; margin-bottom: 0.7rem; }
    .tags span { display: inline-block; font-size: 0.72rem; color: #3D6B4F; border: 1px solid #3D6B4F; border-radius: 999px; padding: 2px 8px; margin-right: 4px; }

    /* ============ 方式① サムネイル切り替え ============ */
    .gallery1__main {
      position: relative;
      background: #e8e4dc;
    }
    .gallery1__main img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .gallery1__thumbs {
      display: flex;
      gap: 4px;
      padding: 6px;
      background: #1a1a1a;
    }
    .gallery1__thumbs img {
      width: calc(20% - 4px);
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
      border: 2px solid transparent;
    }
    .gallery1__thumbs img.active,
    .gallery1__thumbs img:hover {
      opacity: 1;
      border-color: #3D6B4F;
    }
    .gallery1__badge {
      position: absolute;
      top: 8px;
      left: 8px;
    }

    /* ============ 方式② スライダー ============ */
    .gallery2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      background: #ccc;
    }
    .gallery2__before,
    .gallery2__after {
      position: relative;
      background: #e8e4dc;
    }
    .gallery2__before img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .gallery2__after {
      position: relative;
      overflow: hidden;
    }
    .gallery2__after-track {
      display: flex;
      transition: transform 0.35s ease;
    }
    .gallery2__after-track img {
      width: 100%;
      flex-shrink: 0;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .gallery2__btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.45);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 0.9rem;
      cursor: pointer;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gallery2__btn--prev { left: 4px; }
    .gallery2__btn--next { right: 4px; }
    .gallery2__dots {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
    }
    .gallery2__dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
    }
    .gallery2__dots span.active {
      background: #fff;
    }
    .gallery2__label {
      position: absolute;
      top: 6px;
      left: 6px;
    }
    .gallery2__count {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 999px;
    }
  </style>
</head>
<body>

  <p style="text-align:center;color:#5C5C5C;font-size:0.9rem;">★ サンプル比較ページ ★ どちらの方式がお好みか確認してください</p>

  <!-- ============ 方式① ============ -->
  <h2>方式① メイン写真＋サムネイル切り替え</h2>

  <div class="card">
    <div class="gallery1__main" id="g1main">
      <span class="gallery1__badge label label-before" id="g1badge">Before</span>
      <img id="g1img" src="src/images/スクリーンショット 2026-05-21 172541.png" alt="メイン写真">
    </div>
    <div class="gallery1__thumbs">
      <img src="src/images/スクリーンショット 2026-05-21 172541.png"
           alt="Before" class="active"
           onclick="switchMain(this,'Before','before')" title="Before">
      <img src="src/images/スクリーンショット 2026-05-21 172457.png"
           alt="After1" onclick="switchMain(this,'After','after')" title="After①">
      <img src="src/images/スクリーンショット 2026-05-21 172308.png"
           alt="After2" onclick="switchMain(this,'After','after')" title="After②">
      <!-- After写真が増えたらここに追加するだけ -->
    </div>
    <div class="card__body">
      <div class="card__meta">📍 さいたま市中央区・戸建て　🌿 国産表替え・星美表 彩り</div>
      <p class="card__comment">床の間のある素敵な和室を畳替えしました。無地の縁が際立って素敵なお部屋になりました。</p>
      <div class="tags">
        <span>#畳</span><span>#表替え</span><span>#国産い草</span><span>#星美表彩り</span>
      </div>
    </div>
  </div>


  <!-- ============ 方式② ============ -->
  <h2>方式② Before固定＋After矢印スライダー</h2>

  <div class="card">
    <div class="gallery2">

      <!-- Before（固定） -->
      <div class="gallery2__before">
        <span class="gallery2__label label label-before">Before</span>
        <img src="src/images/スクリーンショット 2026-05-21 172541.png" alt="Before">
      </div>

      <!-- After（スライダー） -->
      <div class="gallery2__after" id="g2">
        <span class="gallery2__label label label-after">After</span>
        <div class="gallery2__after-track" id="g2track">
          <img src="src/images/スクリーンショット 2026-05-21 172457.png" alt="After1">
          <img src="src/images/スクリーンショット 2026-05-21 172308.png" alt="After2">
          <!-- After写真が増えたらここに追加するだけ -->
        </div>
        <button class="gallery2__btn gallery2__btn--prev" onclick="slideAfter(-1)">‹</button>
        <button class="gallery2__btn gallery2__btn--next" onclick="slideAfter(1)">›</button>
        <div class="gallery2__dots" id="g2dots"></div>
        <span class="gallery2__count" id="g2count">1 / 2</span>
      </div>

    </div>
    <div class="card__body">
      <div class="card__meta">📍 さいたま市中央区・戸建て　🌿 国産表替え・星美表 彩り</div>
      <p class="card__comment">床の間のある素敵な和室を畳替えしました。無地の縁が際立って素敵なお部屋になりました。</p>
      <div class="tags">
        <span>#畳</span><span>#表替え</span><span>#国産い草</span><span>#星美表彩り</span>
      </div>
    </div>
  </div>


  <script>
    /* ---- 方式① サムネイル切り替え ---- */
    function switchMain(thumb, label, type) {
      document.getElementById('g1img').src = thumb.src;
      document.getElementById('g1badge').textContent = label;
      document.getElementById('g1badge').className =
        'gallery1__badge label ' + (type === 'before' ? 'label-before' : 'label-after');
      document.querySelectorAll('.gallery1__thumbs img').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
    }

    /* ---- 方式② スライダー ---- */
    const track = document.getElementById('g2track');
    const imgs  = track.querySelectorAll('img');
    const dotsEl = document.getElementById('g2dots');
    const countEl = document.getElementById('g2count');
    let current = 0;

    // ドット生成
    imgs.forEach((_, i) => {
      const d = document.createElement('span');
      if (i === 0) d.classList.add('active');
      d.onclick = () => goTo(i);
      dotsEl.appendChild(d);
    });

    function goTo(n) {
      current = (n + imgs.length) % imgs.length;
      track.style.transform = `translateX(-${current * 100}%)`;
      dotsEl.querySelectorAll('span').forEach((d, i) =>
        d.classList.toggle('active', i === current));
      countEl.textContent = `${current + 1} / ${imgs.length}`;
    }
    function slideAfter(dir) { goTo(current + dir); }
  </script>

</body>
</html>
