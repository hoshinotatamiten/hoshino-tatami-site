<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <!-- 外円 -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#3D6B4F" stroke-width="1.8"/>
  <!-- 内円 -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#C8A96E" stroke-width="0.8"/>

  <!-- 五芒星（星モチーフ） -->
  <polygon
    points="32,11 36.2,24.8 51,24.8 39.4,33.2 43.6,47 32,38.6 20.4,47 24.6,33.2 13,24.8 27.8,24.8"
    fill="#3D6B4F"
  />

  <!-- 縦区切り線（金） -->
  <line x1="76" y1="10" x2="76" y2="54" stroke="#C8A96E" stroke-width="1"/>

  <!-- 星野畳店 メインテキスト -->
  <text
    x="90" y="37"
    font-family="'Noto Serif JP', 'Yu Mincho', serif"
    font-size="26"
    font-weight="700"
    fill="#3D6B4F"
    letter-spacing="5"
  >星野畳店</text>

  <!-- 上部サブテキスト：さいたま市南区 -->
  <text
    x="92" y="18"
    font-family="'Noto Sans JP', sans-serif"
    font-size="9"
    fill="#8B6914"
    letter-spacing="2"
  >さいたま市南区</text>

  <!-- 下部英語テキスト -->
  <text
    x="92" y="54"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="11"
    fill="#8B6914"
    letter-spacing="5"
  >HOSHINO TATAMI</text>
</svg>
